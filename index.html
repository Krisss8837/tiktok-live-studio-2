<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <title>Stream Banner - Rotating Gifts</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: transparent;
            overflow: hidden;
        }

        /* Główny kontener paska */
        .banner-container {
            width: 100vw;
            height: 300px; 
            background: transparent;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
        }

        /* Ścieżka przesuwająca cały pasek w 120 sekund */
        .banner-track {
            display: flex;
            width: max-content;
            align-items: center;
            animation: scrollBanner 120s linear infinite;
        }

        /* Pojedynczy kontener giftu (odpowiada za obrót 3D) */
        .gift-item {
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 30px; /* Odstęp między gifty */
            perspective: 1000px;
        }

        /* Obrazek giftu, który się obraca i ma usunięte czarne tło */
        .gift-img {
            height: 250px;
            width: auto;
            display: block;
            mix-blend-mode: screen; /* Usuwa czarne tło */
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            animation: rotateGift 4s ease-in-out infinite; /* Czas obrotu jednego giftu (np. 4 sekundy) */
        }

        /* Płynna animacja obrotu giftu wokół własnej osi */
        @keyframes rotateGift {
            0% {
                transform: rotateY(0deg);
            }
            100% {
                transform: rotateY(360deg);
            }
        }

        /* Animacja przesuwania całego paska (120s) - duplikaty zapewniają płynną pętlę */
        @keyframes scrollBanner {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(-50%);
            }
        }
    </style>
</head>
