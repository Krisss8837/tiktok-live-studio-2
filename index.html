<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Stream Banner</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: transparent;
            overflow: hidden;
        }

        /* Główny kontener paska z przezroczystym tłem */
        .banner-container {
            width: 100vw;
            height: 300px; 
            background: transparent; /* Zmieniono z black na transparent */
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
        }

        /* Ścieżka, w której przesuwają się obrazki */
        .banner-track {
            display: flex;
            width: max-content;
            animation: scrollBanner 120s linear infinite;
        }

        /* Styl dla obu kopii obrazka z giftami */
        .banner-image {
            height: 300px; 
            width: auto;   
            display: block;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
        }

        /* Płynna animacja przewijania */
        @keyframes scrollBanner {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(-50%);
            }
        }
    </style>
</head>
<body>

    <div class="banner-container">
        <div class="banner-track">
            <img src="nowy preset.png" class="banner-image" alt="Banner Giftów">
            <img src="nowy preset.png" class="banner-image" alt="Banner Giftów Kopia">
        </div>
    </div>

</body>
</html>
