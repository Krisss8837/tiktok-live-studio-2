<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Stream Gift Rotator</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: transparent;
            overflow: hidden;
        }

        .banner-container {
            width: 100vw;
            height: 300px; 
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1000px;
        }

        .gift-img {
            height: 250px;
            width: auto;
            display: block;
            mix-blend-mode: screen;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            transform-style: preserve-3d;
            /* Czas jednego obrotu (zmiana na kolejny gift następuje co 4 sekundy) */
            animation: rotateGift 4s linear infinite;
        }

        @keyframes rotateGift {
            0% {
                transform: rotateY(0deg);
            }
            100% {
                transform: rotateY(360deg);
            }
        }
    </style>
</head>
<body>

    <div class="banner-container">
        <img id="giftImage" src="1.png" class="gift-img" alt="Gift">
    </div>

    <script>
        let currentGift = 1;
        const totalGifts = 35;
        const imgElement = document.getElementById('giftImage');

        // Co 4 sekundy (tyle trwa jeden obrót) zmienia obrazek na kolejny
        setInterval(() => {
            currentGift++;
            if (currentGift > totalGifts) {
                currentGift = 1;
            }
            imgElement.src = currentGift + '.png';
        }, 4000);
    </script>

</body>
</html>
